# fly.toml app configuration file generated for james-livengood-web on 2026-06-23T15:07:17-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'james-livengood-web'
primary_region = 'dfw'

[build]
  [build.args]
    EXPO_PUBLIC_API_URL = "https://james-livengood-api.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
