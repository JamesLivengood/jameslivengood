# fly.toml app configuration file generated for james-livengood-api on 2026-06-21T17:56:25-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'james-livengood-api'
primary_region = 'dfw'

[build]

[env]
  PORT = '8000'

[[mounts]]
  source = 'uploads_data'
  destination = '/app/uploads'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
